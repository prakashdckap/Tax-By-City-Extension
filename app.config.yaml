application:
  actions: actions
  runtimeManifest:
    database:
      auto-provision: false
      region: amer
    packages:
      tax-by-city:
        license: Apache-2.0
        actions:
          tax-config:
            function: actions/webAPI/tax-config/index.js
            web: 'yes'
            runtime: nodejs:22
            inputs:
              LOG_LEVEL: debug
              RUNTIME_USERNAME: $RUNTIME_USERNAME
              RUNTIME_PASSWORD: $RUNTIME_PASSWORD
              ADOBE_CLIENT_ID: $ADOBE_CLIENT_ID
              ADOBE_CLIENT_SECRET: $ADOBE_CLIENT_SECRET
              ADOBE_TOKEN_URL: $ADOBE_TOKEN_URL
              ADOBE_SCOPE: $ADOBE_SCOPE_EXTENDED
              ADOBE_ORG_ID: $ADOBE_ORG_ID
            annotations:
              require-adobe-auth: false
              include-ims-credentials: true
              final: true
          generic:
            function: actions/generic/index.js
            web: 'yes'
            runtime: nodejs:22
            inputs:
              LOG_LEVEL: debug
            annotations:
              require-adobe-auth: true
              final: true
          publish-events:
            function: actions/publish-events/index.js
